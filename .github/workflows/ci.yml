# ============================================================================
# CI/CD Pipeline — Restaurants-e2
#
# Trigger:
#   - tests: lint + test (cobertura ≥ 90%)
#   - dev:   lint + build de imágenes Docker
#   - main:  lint + build + push a GHCR
#
# Jobs:
#   1. lint:  go vet + staticcheck. Corre en todos los branches.
#   2. test:  pruebas unitarias contra Postgres + MongoDB. Solo en branch tests.
#   3. build: build de imágenes Docker. Solo en dev/main. Requiere lint.
#   4. push:  publicar al GHCR. Solo en push a main.
# ============================================================================

name: CI

on:
  push:
    branches: [main, dev, tests]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  GO_VERSION: "1.23"
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}  # ghcr.io/<owner>/<repo>

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go mod verify
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    # Solo corre en el branch tests — dev y main no tienen archivos *_test.go
    if: github.ref == 'refs/heads/tests'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: restaurants
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Apply Postgres schema
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d restaurants \
            -f deployments/postgres/init.sql

      - name: Run tests (Postgres)
        env:
          POSTGRES_TEST_URL: postgres://postgres:postgres@localhost:5432/restaurants
        run: |
          go test ./internal/... \
            -count=1 \
            -coverprofile=coverage-pg.out \
            -covermode=atomic \
            -timeout 120s

      - name: Run tests (MongoDB)
        env:
          MONGO_TEST_URI: mongodb://localhost:27017
        run: |
          go test ./internal/... \
            -count=1 \
            -coverprofile=coverage-mongo.out \
            -covermode=atomic \
            -timeout 120s

      - name: Check coverage ≥ 90%
        run: |
          go tool cover -func=coverage-pg.out | tail -1
          COVERAGE=$(go tool cover -func=coverage-pg.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Cobertura total: ${COVERAGE}%"
          awk -v cov="$COVERAGE" 'BEGIN { if (cov+0 < 90) { print "ERROR: cobertura " cov "% es menor al 90% requerido"; exit 1 } }'

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint
    # En dev y main no hay tests, así que build depende solo de lint
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    strategy:
      matrix:
        service: [api, auth, search]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.service }}
          push: false
          tags: ${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [lint, build]
    # Solo publica en push a main — no en PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, auth, search]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
