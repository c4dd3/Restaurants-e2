# ============================================================================
# CI/CD Pipeline — Restaurants-e2
#
# Trigger:
#   - tests: lint + test (cobertura ≥ 90%) + e2e (stack completo)
#   - dev:   lint + build de imágenes Docker
#   - main:  lint + build + push a GHCR
#
# Jobs:
#   1. lint:  go vet + staticcheck. Corre en todos los branches.
#   2. test:  pruebas unitarias e integración contra Postgres + MongoDB. Solo en branch tests.
#   3. e2e:   pruebas end-to-end contra el stack completo (compose). Solo en branch tests.
#   4. build: build de imágenes Docker. Solo en dev/main. Requiere lint.
#   5. push:  publicar al GHCR. Solo en push a main.
# ============================================================================

name: CI

on:
  push:
    branches: [main, dev, tests]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  GO_VERSION: "1.23"
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}  # ghcr.io/<owner>/<repo>

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go mod verify
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    # Solo corre en el branch tests — dev y main no tienen archivos *_test.go
    if: github.ref == 'refs/heads/tests'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: restaurants
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Apply Postgres schema
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d restaurants \
            -f deployments/postgres/init.sql

      - name: Run tests
        env:
          POSTGRES_TEST_URL: postgres://postgres:postgres@localhost:5432/restaurants
          MONGO_TEST_URI: mongodb://localhost:27017
        run: |
          go test ./internal/... \
            -count=1 \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout 120s

      - name: Check coverage ≥ 90%
        run: |
          go tool cover -func=coverage.out | tail -1
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Cobertura total: ${COVERAGE}%"
          awk -v cov="$COVERAGE" 'BEGIN { if (cov+0 < 90) { print "ERROR: cobertura " cov "% es menor al 90% requerido"; exit 1 } }'

  e2e:
    name: E2E Tests (${{ matrix.db }})
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/tests'
    strategy:
      fail-fast: false
      matrix:
        include:
          - db: postgres
            profile: postgres
            engine: postgres
          - db: mongo
            profile: mongo
            engine: mongo

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Crear .env para compose
        run: |
          cp .env.example .env
          sed -i 's/^DB_ENGINE=.*/DB_ENGINE=${{ matrix.engine }}/' .env

      - name: Levantar stack completo
        run: |
          DB_ENGINE=${{ matrix.engine }} docker compose -f deployments/docker-compose.yml --profile ${{ matrix.profile }} up --build -d

      - name: Esperar que los servicios estén healthy
        run: |
          echo "Esperando que nginx responda..."
          for i in $(seq 1 40); do
            curl -sf http://localhost/healthz > /dev/null 2>&1 && \
            curl -sf http://localhost/api/health > /dev/null 2>&1 && \
            curl -sf http://localhost/auth/health > /dev/null 2>&1 && \
            curl -sf http://localhost/search/health > /dev/null 2>&1 && \
            echo "Stack listo ✓" && break
            echo "Intento $i/40 — esperando 5s..."
            sleep 5
          done

      - name: Correr tests E2E
        run: |
          go test ./test/... -v -tags e2e -count=1 -timeout 120s

      - name: Logs del stack (si falla)
        if: failure()
        run: docker compose -f deployments/docker-compose.yml --profile ${{ matrix.profile }} logs --tail=50

      - name: Bajar stack
        if: always()
        run: docker compose -f deployments/docker-compose.yml --profile ${{ matrix.profile }} down -v

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint
    # En dev y main no hay tests, así que build depende solo de lint
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    strategy:
      matrix:
        service: [api, auth, search]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.service }}
          push: false
          tags: ${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [lint, build]
    # Solo publica en push a main — no en PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, auth, search]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image namespace (lowercase)
        id: ns
        run: echo "value=$(echo '${{ env.IMAGE_NAMESPACE }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.ns.outputs.value }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ steps.ns.outputs.value }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
