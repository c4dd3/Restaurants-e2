# ============================================================================
# CI/CD Pipeline — Restaurants-e2
#
# Trigger: push a main/dev, pull requests a main, y manualmente.
#
# Jobs:
#   1. test:  lint + unit tests + integration tests (con services de compose).
#   2. build: build de imágenes Docker para los 3 servicios.
#   3. push:  publicar al Container Registry del repo (GHCR). Solo en push a main.
#
# El job `push` depende de `test` y `build` — si algo falla no se publica una imagen rota.
# ============================================================================

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: "1.22"
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}  # ghcr.io/<owner>/<repo>

jobs:

  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    # Servicios gestionados por GitHub Actions para los tests de integración.
    # Se exponen sus puertos en localhost del runner.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: restaurants_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7.4-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go mod verify
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false

      - name: Unit & integration tests con cobertura
        env:
          DB_ENGINE: postgres
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: restaurants_test
          REDIS_ADDR: localhost:6379
          JWT_SECRET: ci-test-secret-minimum-length-32chars
        run: |
          go test ./... -race -coverprofile=coverage.out -covermode=atomic -coverpkg=./...
          go tool cover -func=coverage.out | tee coverage.txt
          # El enunciado pide >= 90% cobertura
          COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | tr -d '%')
          echo "Cobertura total: ${COVERAGE}%"
          awk -v c="$COVERAGE" 'BEGIN { if (c+0 < 90) { print "Cobertura < 90%"; exit 1 } }'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.txt

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [api, auth, search]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.service }}
          push: false
          tags: ${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [test, build]
    # Solo publica en push a main — no en PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, auth, search]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
