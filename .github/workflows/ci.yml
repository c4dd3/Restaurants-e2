# ============================================================================
# CI/CD Pipeline — Restaurants-e2
#
# Trigger: push a main/dev, pull requests a main, y manualmente.
#
# Jobs:
#   1. lint:  go vet + staticcheck sobre todo el árbol.
#   2. build: build de imágenes Docker para los 3 servicios.
#   3. push:  publicar al Container Registry del repo (GHCR). Solo en push a main.
#
# NOTA: el job de tests quedó pospuesto a la fase final del proyecto.
# Cuando se agregue, se reincorpora acá con un job `test` y se lo pone como
# dependencia de `build`.
# ============================================================================

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: "1.22"
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}  # ghcr.io/<owner>/<repo>

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go mod verify
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [api, auth, search]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.service }}
          push: false
          tags: ${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [lint, build]
    # Solo publica en push a main — no en PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, auth, search]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
