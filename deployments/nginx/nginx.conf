# ============================================================================
# Nginx — balanceador de carga para Restaurants-e2
#
# Responsabilidades:
#   1. Terminar HTTP en el puerto 80 (único punto de entrada público).
#   2. Rutear:
#        /api/**    → api-service     (puerto 8080)
#        /search/** → search-service  (puerto 8082)
#        /auth/**   → auth-service    (puerto 8081)
#   3. Balancear entre múltiples instancias descubiertas por DNS de Docker.
#      Docker resuelve el hostname "api" a TODAS las IPs de los contenedores
#      vivos. El resolver 127.0.0.11 con valid=5s re-consulta cada 5s, de modo
#      que cuando un contenedor muere deja de aparecer en el pool.
#
# Si un contenedor muere mid-request:
#   proxy_next_upstream lo detecta y reintenta en otro contenedor vivo.
# ============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Formato de log que muestra el upstream al que fue cada request —
    # útil para verificar que el balanceo distribuye entre instancias.
    log_format lb_format '$remote_addr - [$time_local] "$request" '
                         'status=$status upstream="$upstream_addr" '
                         'req_time=$request_time';
    access_log /var/log/nginx/access.log lb_format;

    # DNS interno de Docker. valid=5s re-resuelve frecuentemente para detectar
    # contenedores muertos o nuevos dentro de los primeros 5 segundos.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # Si el upstream falla (error de conexión, timeout, 502/503/504),
    # nginx reintenta automáticamente en otra instancia viva.
    # tries=3: hasta 3 intentos antes de devolver error al cliente.
    proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    proxy_next_upstream_tries 3;
    proxy_next_upstream_timeout 10s;

    server {
        listen 80;
        server_name _;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Health del propio balanceador.
        location = /healthz {
            access_log off;
            return 200 '{"service":"nginx","status":"ok"}';
            default_type application/json;
        }

        # /api/** — CRUD principal.
        # set $upstream fuerza re-resolución DNS por request (round-robin entre réplicas).
        location /api/ {
            set $upstream_api http://api:8080;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $upstream_api;
        }

        # /auth/** — autenticación
        location /auth/ {
            set $upstream_auth http://auth:8081;
            proxy_pass $upstream_auth;
        }

        # /search/** — búsqueda
        location /search/ {
            set $upstream_search http://search:8082;
            proxy_pass $upstream_search;
        }

        location / {
            return 404 '{"error":"not found"}';
            default_type application/json;
        }
    }
}
