# ============================================================================
# Nginx — balanceador de carga para Restaurants-e2
#
# Responsabilidades:
#   1. Terminar HTTP en el puerto 80 (único punto de entrada público).
#   2. Rutear:
#        /api/**    → api-service     (puerto 8080)
#        /search/** → search-service  (puerto 8082)
#        /auth/**   → auth-service    (puerto 8081)
#   3. Balancear entre múltiples instancias descubiertas por DNS de Docker.
#      Cuando hacés `docker compose up --scale api=3`, Docker crea 3 contenedores
#      que resuelven al mismo hostname "api". Usamos `resolver 127.0.0.11`
#      (DNS interno de Docker) + `set $upstream_xxx ...` para re-resolver en
#      cada request — si no, nginx cachea la primera IP y no balancea.
# ============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Formato de log que incluye el upstream al que se envió la request — útil
    # para validar en la evaluación que el balanceo está distribuyendo carga.
    log_format lb_format '$remote_addr - [$time_local] "$request" '
                         'status=$status upstream="$upstream_addr" '
                         'req_time=$request_time';
    access_log /var/log/nginx/access.log lb_format;

    # DNS de Docker — crítico para descubrir réplicas al escalar.
    # valid=5s limita el cache para que las nuevas instancias se incluyan rápido.
    resolver 127.0.0.11 valid=5s ipv6=off;

    upstream api_backend    { server api:8080; }
    upstream auth_backend   { server auth:8081; }
    upstream search_backend { server search:8082; }

    server {
        listen 80;
        server_name _;

        # Headers estándar de proxy — necesarios para logging y generación de URLs.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts conservadores para evitar conexiones colgadas consumiendo workers.
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Health del balanceador mismo — útil para smoke tests.
        location = /healthz {
            access_log off;
            return 200 '{"service":"nginx","status":"ok"}';
            default_type application/json;
        }

        # /api/** — CRUD principal. El `set` + variable fuerza re-resolución DNS.
        location /api/ {
            set $upstream_api http://api:8080;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $upstream_api;
        }

        # /search/** — microservicio de búsqueda
        location /search/ {
            set $upstream_search http://search:8082;
            proxy_pass $upstream_search;
        }

        # /auth/** — autenticación (register, login)
        location /auth/ {
            set $upstream_auth http://auth:8081;
            proxy_pass $upstream_auth;
        }

        # Catch-all: 404 para paths no reconocidos — evita revelar topología interna.
        location / {
            return 404 '{"error":"not found"}';
            default_type application/json;
        }
    }
}
